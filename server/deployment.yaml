apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: dealership
  name: dealership
spec:
  replicas: 1
  selector:
    matchLabels:
      run: dealership
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        run: dealership
    spec:
      containers:
      - image: docker.io/kose2888/dealership:v1.0
        imagePullPolicy: Always
        name: dealership
        env:
        - name: backend_url
          value: "http://host.docker.internal:3030"
        - name: sentiment_analyzer_url
          value: "http://host.docker.internal:5000/"
        ports:
        - containerPort: 8000
          protocol: TCP
      restartPolicy: Always
      imagePullSecrets:
        - name: my-registry-key
